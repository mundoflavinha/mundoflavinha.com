services:
  mundo_flavinha:
    container_name: cnt-mundo_flavinha
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5175:5175"
    volumes:
      - ./:/app
      - mundo_flavinha_node_modules:/app/node_modules
      - mundo_flavinha_pnpm_store:/pnpm/store
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
    stdin_open: true
    tty: true
    init: true
    command: ["dev"]

volumes:
  mundo_flavinha_node_modules:
  mundo_flavinha_pnpm_store:
